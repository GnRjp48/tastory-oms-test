<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f3d2b" />
    <title>Tastory OMS Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f5ed;
        color: #243029;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(88vw, 28rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: white;
        box-shadow: 0 12px 35px rgba(41, 54, 45, 0.09);
      }
      h1 {
        margin: 0;
        color: #1f3d2b;
      }
      p {
        line-height: 1.6;
      }
      a {
        color: #e57e3d;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tastory OMS is offline</h1>
      <p>Your saved orders are still on this device. Reopen the app when the page is available again.</p>
      <a href="./">Try again</a>
    </main>
  </body>
</html>
